<!DOCTYPE html>
<html>
<head>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<style>
  body { background-color: #E4E9E5; font-family: ui-sans-serif, system-ui, sans-serif; overflow: hidden; }
  .bg-dots { background-image: radial-gradient(#1A1A1A 1px, transparent 1px); background-size: 20px 20px; opacity: 0.15; }
  
  /* 通用节点样式 */
  .node-base { position: absolute; z-index: 10; border: 2px solid #1A1A1A; box-shadow: 4px 4px 0px #1A1A1A; transition: transform 0.2s, box-shadow 0.2s; cursor: grab; }
  .node-base:hover { transform: translateY(-2px); box-shadow: 6px 6px 0px #1A1A1A; }
  
  /* 连接点 */
  .handle { width: 10px; height: 10px; background-color: #1A1A1A; border: 2px solid #E4E9E5; border-radius: 50%; position: absolute; top: 50%; transform: translateY(-50%); z-index: 20;}
  .handle-left { left: -6px; }
  .handle-right { right: -6px; }
  
  /* 切角形状 (用于条件节点) */
  .clip-corner { clip-path: polygon(10px 0, 100% 0, 100% calc(100% - 10px), calc(100% - 10px) 100%, 0 100%, 0 10px); }
</style>
</head>
<body class="flex items-center justify-center h-screen relative">
  <div class="absolute inset-0 bg-dots z-0"></div>

  <!-- 连线示意 -->
  <svg class="absolute inset-0 w-full h-full z-0" pointer-events="none">
    <path d="M 220 300 C 300 300, 300 300, 380 300" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-dasharray="4" />
    <path d="M 580 300 C 650 300, 650 220, 720 220" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-dasharray="4" />
    <path d="M 580 300 C 650 300, 650 380, 720 380" fill="none" stroke="#1A1A1A" stroke-width="2" stroke-dasharray="4" />
  </svg>

  <!-- 1. 起点节点 (Trigger) - 莫兰迪绿, 左侧圆角 -->
  <div class="node node-base left-[50px] top-[276px] w-40 bg-[#849C8A] rounded-l-full flex items-center pl-2 pr-4 py-2">
    <div class="w-8 h-8 bg-[#1A1A1A] rounded-full flex items-center justify-center text-[#E4E9E5] mr-3 shrink-0">
      <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
    </div>
    <div>
      <div class="text-xs font-bold text-[#1A1A1A]">SCHEDULE</div>
      <div class="text-[10px] font-mono text-[#1A1A1A]/80">0 * * * *</div>
    </div>
    <div class="handle handle-right"></div>
  </div>

  <!-- 2. 处理节点 (Action) - 纯白, 直角, 顶部色条 -->
  <div class="node node-base left-[380px] top-[260px] w-48 bg-white flex flex-col">
    <div class="handle handle-left"></div>
    <div class="bg-[#1A1A1A] text-white px-3 py-1 text-xs font-bold flex items-center gap-2">
      <div class="w-2 h-2 bg-[#A3B8CC] rounded-full"></div> <!-- 蓝色系代表文件操作 -->
      SCAN DIR
    </div>
    <div class="p-3">
      <div class="text-xs text-gray-500 mb-1">Target Path</div>
      <div class="text-xs font-mono bg-gray-100 p-1 border border-gray-300 truncate">/mnt/media/raw</div>
    </div>
    <div class="handle handle-right"></div>
  </div>

  <!-- 3. 条件节点 (Router) - 浅灰, 切角, 多输出 -->
  <div class="node node-base left-[720px] top-[180px] w-48 bg-[#F2F5F3] clip-corner flex flex-col">
    <div class="handle handle-left" style="top: 40px"></div>
    <div class="border-b-2 border-[#1A1A1A] px-3 py-2 text-xs font-bold text-[#1A1A1A] flex items-center gap-2">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M6 9l6 6 6-6"/></svg>
      CATEGORY ROUTER
    </div>
    <div class="flex flex-col">
      <div class="relative px-3 py-2 border-b border-[#1A1A1A]/20 hover:bg-black/5">
        <span class="text-xs font-mono font-bold">if: photo</span>
        <div class="handle handle-right"></div>
      </div>
      <div class="relative px-3 py-2 hover:bg-black/5">
        <span class="text-xs font-mono font-bold">if: video</span>
        <div class="handle handle-right"></div>
      </div>
    </div>
  </div>

  <script>
    gsap.from('.node', { scale: 0.9, opacity: 0, y: 10, duration: 0.5, stagger: 0.15, ease: "back.out(1.2)" });
  </script>
</body>
</html>
